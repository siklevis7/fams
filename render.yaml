databases:
  - name: kfms-db
    plan: free
    databaseName: kfms
    user: kfms_user

services:
  - type: web
    name: kfms-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: kfms-db
          property: connectionString
      - key: KFMS_JWT_SECRET
        generateValue: true
      - key: KFMS_ALLOWED_ORIGINS
        sync: false
